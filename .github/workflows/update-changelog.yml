name: Update Changelog

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update CHANGELOG.md
        run: |
          CHANGELOG_FILE="CHANGELOG.md"

          # Create CHANGELOG.md if it does not exist
          if [ ! -f "$CHANGELOG_FILE" ]; then
            cat > "$CHANGELOG_FILE" << 'EOF'
          # Changelog

          Changes are generated from the Git commit log and grouped by commit date.

          EOF
          fi

          # Get the latest non-bot commit
          COMMIT_HASH=$(git log --pretty=format:'%h' --author='github-actions\[bot\]' --invert-grep -n 1)
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' "$COMMIT_HASH")
          COMMIT_DATE=$(git log -1 --date=short --pretty=format:'%ad' "$COMMIT_HASH")

          # Stop if this commit is already in the changelog
          if grep -q "$COMMIT_HASH" "$CHANGELOG_FILE"; then
            echo "Commit already exists in changelog."
            exit 0
          fi

          NEW_ENTRY="- \`$COMMIT_HASH\` $COMMIT_MSG"

          python3 << EOF
          from pathlib import Path

          changelog = Path("$CHANGELOG_FILE")
          content = changelog.read_text()

          date_heading = "## $COMMIT_DATE"
          new_entry = "$NEW_ENTRY"

          lines = content.splitlines()

          # Ensure base header exists
          if not content.strip():
              lines = [
                  "# Changelog",
                  "",
                  "Changes are generated from the Git commit log and grouped by commit date.",
                  ""
              ]

          if date_heading in lines:
              index = lines.index(date_heading)

              # Insert below date heading and separator/blank area
              insert_at = index + 1
              while insert_at < len(lines) and lines[insert_at].strip() == "":
                  insert_at += 1

              lines.insert(insert_at, new_entry)
          else:
              # Insert new date section after intro text
              insert_at = 3
              while insert_at < len(lines) and lines[insert_at].strip() == "":
                  insert_at += 1

              new_section = [
                  "",
                  date_heading,
                  "",
                  new_entry
              ]

              lines[insert_at:insert_at] = new_section

          changelog.write_text("\\n".join(lines).rstrip() + "\\n")
          EOF

      - name: Commit and push changelog
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes."
            exit 0
          fi

          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md [skip ci]"
          git push